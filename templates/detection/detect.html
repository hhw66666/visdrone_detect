{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目标检测 - 科大巡弋</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <script src="{% static 'js/common.js' %}"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Tech Background */
        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0,195,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,195,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00c3ff 0%, transparent 70%);
            top: -100px;
            left: 20%;
        }

        .glow-orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #6366f1 0%, transparent 70%);
            bottom: 10%;
            right: -50px;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 60px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,195,255,0.1);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(0,195,255,0.5);
        }

        .nav-links { display: flex; gap: 40px; }

        .nav-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s;
            padding: 8px 0;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00c3ff, #6366f1);
            transition: width 0.3s;
        }

        .nav-link:hover, .nav-link.active { color: #fff; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        .nav-user { display: flex; align-items: center; gap: 20px; }
        .user-name { font-size: 0.875rem; color: rgba(255,255,255,0.7); }

        .btn-logout {
            padding: 8px 16px;
            background: rgba(0,195,255,0.1);
            border: 1px solid rgba(0,195,255,0.2);
            color: #00c3ff;
            text-decoration: none;
            font-size: 0.8rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(0,195,255,0.2);
            box-shadow: 0 0 20px rgba(0,195,255,0.2);
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger {
            display: block;
            width: 24px;
            height: 2px;
            background: currentColor;
            position: relative;
            transition: all 0.3s;
        }

        .hamburger::before,
        .hamburger::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: currentColor;
            transition: all 0.3s;
        }

        .hamburger::before { top: -8px; }
        .hamburger::after { bottom: -8px; }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            background: rgba(10,10,15,0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,195,255,0.1);
            padding: 20px;
            z-index: 99;
        }

        .mobile-menu.active { display: block; }

        .mobile-menu .nav-link {
            display: block;
            padding: 16px 0;
            border-bottom: 1px solid rgba(0,195,255,0.05);
        }

        /* Main */
        .main {
            position: relative;
            z-index: 10;
            padding-top: 64px;
            min-height: 100vh;
        }

        /* Hero */
        .hero {
            padding: 80px 60px 40px;
            text-align: center;
        }

        .hero-title {
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #00c3ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }

        /* Layout */
        .layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 32px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px 100px;
        }

        /* Card */
        .card {
            background: rgba(20,20,30,0.6);
            border: 1px solid rgba(0,195,255,0.1);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(10px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,195,255,0.1);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .card-badge {
            padding: 6px 12px;
            background: rgba(0,195,255,0.1);
            border: 1px solid rgba(0,195,255,0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            color: #00c3ff;
        }

        /* Upload */
        .upload-area {
            position: relative;
            border: 1px dashed rgba(0,195,255,0.3);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 24px;
            overflow: hidden;
            background: rgba(0,195,255,0.02);
        }

        .upload-area:hover {
            border-color: rgba(0,195,255,0.5);
            background: rgba(0,195,255,0.05);
            box-shadow: 0 0 30px rgba(0,195,255,0.1);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            opacity: 0.7;
        }

        .upload-icon svg {
            width: 100%;
            height: 100%;
            stroke: #00c3ff;
            stroke-width: 1.5;
            fill: none;
        }

        .upload-text {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .upload-hint {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
        }

        #file-input { display: none; }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(0,195,255,0.05);
            border: 1px solid rgba(0,195,255,0.15);
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.85rem;
            display: none;
        }

        .file-icon {
            width: 32px;
            height: 32px;
            background: rgba(0,195,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-icon svg {
            width: 16px;
            height: 16px;
            stroke: #00c3ff;
            stroke-width: 2;
            fill: none;
        }

        .file-details { flex: 1; }

        .file-name {
            color: #fff;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        /* Params */
        .params-section { margin-bottom: 24px; }

        .param { margin-bottom: 20px; }

        .param-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .param-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        .param-value {
            font-size: 0.85rem;
            font-weight: 600;
            color: #00c3ff;
            padding: 4px 10px;
            background: rgba(0,195,255,0.1);
            border-radius: 6px;
        }

        .param-slider {
            width: 100%;
            height: 4px;
            background: rgba(0,195,255,0.2);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .param-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s;
            box-shadow: 0 2px 10px rgba(0,195,255,0.5);
        }

        .param-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        /* Button */
        .btn-detect {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,195,255,0.3);
        }

        .btn-detect:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0,195,255,0.5);
        }

        .btn-detect:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-detect svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Preview */
        .preview-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,195,255,0.1);
            display: none;
        }

        .preview-img {
            width: 100%;
            display: block;
        }

        .preview-placeholder {
            padding: 80px 40px;
            text-align: center;
        }

        .placeholder-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            opacity: 0.3;
        }

        .placeholder-icon svg {
            width: 100%;
            height: 100%;
            stroke: #00c3ff;
            stroke-width: 1.5;
            fill: none;
        }

        .placeholder-text {
            color: rgba(255,255,255,0.35);
            font-size: 0.9rem;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0,195,255,0.05);
            border: 1px solid rgba(0,195,255,0.1);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .stat-icon {
            width: 20px;
            height: 20px;
            opacity: 0.6;
        }

        .stat-icon svg {
            width: 100%;
            height: 100%;
            stroke: #00c3ff;
            stroke-width: 2;
            fill: none;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Class List */
        .class-list {
            border-top: 1px solid rgba(0,195,255,0.1);
            padding-top: 20px;
        }

        .class-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .class-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,195,255,0.05);
        }

        .class-item:last-child { border-bottom: none; }

        .class-left { display: flex; align-items: center; gap: 12px; }

        .class-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .class-name {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }

        .class-count {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
        }

        /* Result Table */
        .result-section {
            margin-top: 20px;
            border-top: 1px solid rgba(0,195,255,0.1);
            padding-top: 20px;
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .result-table th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(0,195,255,0.1);
            color: rgba(255,255,255,0.4);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(0,195,255,0.05);
            color: rgba(255,255,255,0.7);
        }

        .result-table tr:last-child td { border-bottom: none; }

        .conf-tag {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(0,195,255,0.1);
            border: 1px solid rgba(0,195,255,0.2);
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #00c3ff;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            display: none;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(0,195,255,0.1);
            border-top-color: #00c3ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
            box-shadow: 0 0 20px rgba(0,195,255,0.3);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }

        @media (max-width: 1024px) {
            .layout { grid-template-columns: 1fr; }
        }

        @media (max-width: 900px) {
            .nav { padding: 0 24px; }
            .nav-links { display: none; }
            .mobile-menu-toggle { display: block; }
            .hero { padding: 60px 24px 30px; }
            .layout { padding: 0 24px 60px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Fullscreen button */
        .btn-fullscreen {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0;
        }

        .preview-container:hover .btn-fullscreen { opacity: 1; }

        .btn-fullscreen:hover {
            background: rgba(0,195,255,0.3);
        }

        .btn-fullscreen svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Cancel button */
        .btn-cancel {
            width: 100%;
            padding: 14px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            margin-top: 12px;
        }

        .btn-cancel:hover {
            background: rgba(239,68,68,0.2);
        }
    </style>
</head>
<body>
    <div class="tech-bg">
        <div class="grid-overlay"></div>
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>

    <nav class="nav">
        <a href="{% url 'detection_home' %}" class="logo">科大巡弋</a>
        <div class="nav-links">
            <a href="{% url 'detection_home' %}" class="nav-link">首页</a>
            <a href="{% url 'detection_detect' %}" class="nav-link active">检测</a>
            <a href="{% url 'detection_history' %}" class="nav-link">历史</a>
            <a href="{% url 'xiaoyu_chat' %}" class="nav-link">小科客服</a>
            <a href="{% url 'detection_profile' %}" class="nav-link">我的</a>
        </div>
        <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
            <span class="hamburger"></span>
        </button>
        <div class="nav-user">
            <span class="user-name">{{ username }}</span>
            <a href="{% url 'logout' %}" class="btn-logout">退出</a>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="{% url 'detection_home' %}" class="nav-link">首页</a>
        <a href="{% url 'detection_detect' %}" class="nav-link active">检测</a>
        <a href="{% url 'detection_history' %}" class="nav-link">历史</a>
        <a href="{% url 'xiaoyu_chat' %}" class="nav-link">小科客服</a>
        <a href="{% url 'detection_profile' %}" class="nav-link">我的</a>
    </div>

    <main class="main">
        <div class="hero">
            <h1 class="hero-title">目标检测</h1>
            <p class="hero-subtitle">上传航拍图片，AI 将自动识别其中的目标</p>
        </div>

        <div class="layout">
            <!-- Left: Upload & Params -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">上传图片</h2>
                    <span class="card-badge">JPG / PNG</span>
                </div>

                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <div class="upload-icon">
                        <svg viewBox="0 0 48 48"><rect x="6" y="8" width="36" height="32" rx="3"/><circle cx="17" cy="20" r="5"/><path d="M42 40L30 28l-8 8-6-6-10 10"/></svg>
                    </div>
                    <div class="upload-text">点击或拖拽图片到此处</div>
                    <div class="upload-hint">或将图片拖放到此处</div>
                </div>
                <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">

                <div class="file-info" id="file-info">
                    <div class="file-icon">
                        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M20 20L14 14l-4 4-6-6"/></svg>
                    </div>
                    <div class="file-details">
                        <div class="file-name" id="file-name"></div>
                        <div class="file-size" id="file-size"></div>
                    </div>
                </div>

                <div class="params-section">
                    <div class="param">
                        <div class="param-header">
                            <span class="param-label">置信度阈值</span>
                            <span class="param-value" id="conf-display">0.25</span>
                        </div>
                        <input type="range" class="param-slider" id="conf-slider" min="0" max="1" step="0.05" value="0.25" oninput="document.getElementById('conf-display').textContent = this.value">
                    </div>

                    <div class="param">
                        <div class="param-header">
                            <span class="param-label">IOU 阈值</span>
                            <span class="param-value" id="iou-display">0.45</span>
                        </div>
                        <input type="range" class="param-slider" id="iou-slider" min="0" max="1" step="0.05" value="0.45" oninput="document.getElementById('iou-display').textContent = this.value">
                    </div>
                </div>

                <button class="btn-detect" id="btn-detect" onclick="startDetect()" disabled>
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
                    开始检测
                </button>
                <button class="btn-cancel" id="btn-cancel" onclick="cancelDetect()">取消检测</button>
            </div>

            <!-- Right: Result -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">检测结果</h2>
                    <span class="card-badge" id="result-badge" style="display:none;">已完成</span>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">AI 正在分析图片...</div>
                </div>

                <div class="preview-container" id="preview-container">
                    <button class="btn-fullscreen" onclick="showFullscreen()" title="全屏查看">
                        <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
                    </button>
                    <img id="preview-result" class="preview-img" alt="Result">
                </div>

                <div class="preview-placeholder" id="placeholder">
                    <div class="placeholder-icon">
                        <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="24"/><circle cx="32" cy="32" r="16"/><circle cx="32" cy="32" r="8"/><circle cx="32" cy="32" r="2"/></svg>
                    </div>
                    <div class="placeholder-text">上传图片后开始检测</div>
                </div>

                <div class="stats-grid" id="stats" style="display:none;">
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon">
                                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
                            </div>
                            <span class="stat-label">检测数量</span>
                        </div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon">
                                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                            </div>
                            <span class="stat-label">类别数</span>
                        </div>
                        <div class="stat-value" id="stat-classes">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon">
                                <svg viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                            </div>
                            <span class="stat-label">平均置信度</span>
                        </div>
                        <div class="stat-value" id="stat-conf">0%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon">
                                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                            </div>
                            <span class="stat-label">检测耗时</span>
                        </div>
                        <div class="stat-value" id="stat-time">0s</div>
                    </div>
                </div>

                <div class="class-list" id="class-list" style="display:none;">
                    <div class="class-title">目标类别分布</div>
                    <div id="class-items"></div>
                </div>

                <div class="result-section" id="result-section">
                    <div class="result-header">
                        <span class="result-title">检测详情</span>
                    </div>
                    <table class="result-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>类别</th>
                                <th>置信度</th>
                                <th>位置坐标</th>
                            </tr>
                        </thead>
                        <tbody id="result-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let file = null;

        const classColors = {
            '小汽车': '#E53935', '摩托车': '#8E24AA', '人群': '#43A047',
            '行人': '#00ACC1', '带篷三轮车': '#FB8C00', '三轮车': '#F4511E',
            '自行车': '#6D4C41', '卡车': '#3949AB', '面包车': '#D81B60', '公交车': '#00897B'
        };

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function handleFile(e) {
            file = e.target.files[0];
            if (!file) return;

            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-size').textContent = formatFileSize(file.size);
            document.getElementById('file-info').style.display = 'flex';
            document.getElementById('btn-detect').disabled = false;

            const url = URL.createObjectURL(file);
            document.getElementById('preview-result').src = url;
            document.getElementById('preview-container').style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';

            document.getElementById('stats').style.display = 'none';
            document.getElementById('class-list').style.display = 'none';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('result-badge').style.display = 'none';
        }

        function getCookie(name) {
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        // Mobile Menu
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('active');
        }

        // Cancel Detection
        let detectController = null;

        async function startDetect() {
            if (!file) return;

            const btn = document.getElementById('btn-detect');
            const cancelBtn = document.getElementById('btn-cancel');
            const loading = document.getElementById('loading');

            btn.disabled = true;
            cancelBtn.style.display = 'block';
            btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0;"></div> 检测中...';
            loading.style.display = 'block';

            const conf = document.getElementById('conf-slider').value;
            const iou = document.getElementById('iou-slider').value;
            const startTime = Date.now();

            const formData = new FormData();
            formData.append('file', file);
            formData.append('conf', conf);
            formData.append('iou', iou);

            detectController = new AbortController();

            try {
                const res = await fetch('{% url "api_detect_image" %}', {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-CSRFToken': getCookie('csrftoken') },
                    signal: detectController.signal
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('preview-result').src = '/' + data.result_image;
                    document.getElementById('result-badge').style.display = 'block';
                    document.getElementById('stat-total').textContent = data.total;

                    const counts = {};
                    let totalConf = 0;
                    data.detections.forEach(d => {
                        counts[d.class] = (counts[d.class] || 0) + 1;
                        totalConf += d.confidence;
                    });

                    document.getElementById('stat-classes').textContent = Object.keys(counts).length;
                    document.getElementById('stat-conf').textContent = (totalConf / data.total * 100).toFixed(0) + '%';
                    document.getElementById('stat-time').textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';

                    let classHtml = '';
                    for (const [cls, cnt] of Object.entries(counts)) {
                        const color = classColors[cls] || '#667eea';
                        classHtml += `
                            <div class="class-item">
                                <div class="class-left">
                                    <div class="class-dot" style="background:${color};color:${color};"></div>
                                    <span class="class-name">${cls}</span>
                                </div>
                                <span class="class-count">${cnt}</span>
                            </div>
                        `;
                    }
                    document.getElementById('class-items').innerHTML = classHtml;

                    let tableHtml = '';
                    data.detections.slice(0, 20).forEach((d, i) => {
                        tableHtml += `<tr>
                            <td>${i + 1}</td>
                            <td>${d.class}</td>
                            <td><span class="conf-tag">${(d.confidence * 100).toFixed(1)}%</span></td>
                            <td>[${d.bbox.join(', ')}]</td>
                        </tr>`;
                    });
                    if (data.detections.length > 20) {
                        tableHtml += `<tr><td colspan="4" style="text-align:center;color:rgba(255,255,255,0.4);padding:16px;">还有 ${data.detections.length - 20} 条结果...</td></tr>`;
                    }
                    document.getElementById('result-tbody').innerHTML = tableHtml;

                    document.getElementById('stats').style.display = 'grid';
                    document.getElementById('class-list').style.display = 'block';
                    document.getElementById('result-section').style.display = 'block';

                    Toast.success('检测完成', '成功');
                } else {
                    Toast.error(data.error || '检测失败', '错误');
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    Toast.info('检测已取消', '提示');
                } else {
                    Toast.error(err.message || '请求失败', '错误');
                }
            } finally {
                btn.disabled = false;
                cancelBtn.style.display = 'none';
                btn.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg> 开始检测';
                loading.style.display = 'none';
                detectController = null;
            }
        }

        function cancelDetect() {
            if (detectController) {
                detectController.abort();
            }
        }

        function showFullscreen() {
            const imgSrc = document.getElementById('preview-result').src;
            if (imgSrc) {
                FullscreenViewer.show(imgSrc);
            }
        }

        // Drag and drop
        const uploadArea = document.querySelector('.upload-area');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.style.borderColor = 'rgba(0,195,255,0.5)';
                uploadArea.style.background = 'rgba(0,195,255,0.05)';
            });
        });
        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.style.borderColor = 'rgba(0,195,255,0.3)';
                uploadArea.style.background = 'rgba(0,195,255,0.02)';
            });
        });
        uploadArea.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files.length) {
                document.getElementById('file-input').files = files;
                handleFile({ target: { files: files } });
            }
        });
    </script>
</body>
</html>

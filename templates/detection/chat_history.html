{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天记录 - 科大巡弋</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger {
            display: block;
            width: 24px;
            height: 2px;
            background: currentColor;
            position: relative;
            transition: all 0.3s;
        }

        .hamburger::before, .hamburger::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: currentColor;
            transition: all 0.3s;
        }

        .hamburger::before { top: -8px; }
        .hamburger::after { bottom: -8px; }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            background: rgba(10,10,15,0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,195,255,0.1);
            padding: 20px;
            z-index: 99;
        }

        .mobile-menu.active { display: block; }
        .mobile-menu .nav-link { display: block; padding: 16px 0; border-bottom: 1px solid rgba(0,195,255,0.05); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }

        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0,195,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,195,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6366f1 0%, transparent 70%);
            top: -100px;
            right: 10%;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 60px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,195,255,0.1);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(0,195,255,0.5);
        }

        .nav-links { display: flex; gap: 40px; }

        .nav-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s;
            padding: 8px 0;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00c3ff, #6366f1);
            transition: width 0.3s;
        }

        .nav-link:hover, .nav-link.active { color: #fff; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        .nav-user { display: flex; align-items: center; gap: 20px; }
        .user-name { font-size: 0.875rem; color: rgba(255,255,255,0.7); }

        .btn-logout {
            padding: 8px 16px;
            background: rgba(0,195,255,0.1);
            border: 1px solid rgba(0,195,255,0.2);
            color: #00c3ff;
            text-decoration: none;
            font-size: 0.8rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(0,195,255,0.2);
            box-shadow: 0 0 20px rgba(0,195,255,0.2);
        }

        .main {
            position: relative;
            z-index: 10;
            padding-top: 64px;
            min-height: 100vh;
        }

        .hero {
            padding: 100px 60px 40px;
        }

        .hero-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #00c3ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }

        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px 100px;
        }

        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .record-card {
            background: rgba(20,20,30,0.6);
            border: 1px solid rgba(0,195,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .record-card:hover {
            border-color: rgba(0,195,255,0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,195,255,0.15);
        }

        .record-body { padding: 24px; }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .record-title {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .record-badge {
            padding: 6px 12px;
            background: rgba(0,195,255,0.1);
            border: 1px solid rgba(0,195,255,0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #00c3ff;
        }

        .record-preview {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 16px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .record-meta { margin-bottom: 16px; }

        .record-time {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }

        .record-actions { display: flex; gap: 10px; }

        .btn-action {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-view {
            background: rgba(0,195,255,0.1);
            color: #00c3ff;
            border: 1px solid rgba(0,195,255,0.2);
        }

        .btn-view:hover {
            background: rgba(0,195,255,0.2);
            box-shadow: 0 0 20px rgba(0,195,255,0.2);
        }

        .btn-delete {
            background: rgba(239,68,68,0.1);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.2);
        }

        .btn-delete:hover {
            background: rgba(239,68,68,0.2);
            box-shadow: 0 0 20px rgba(239,68,68,0.2);
        }

        .empty-state {
            text-align: center;
            padding: 120px 40px;
            background: rgba(20,20,30,0.4);
            border: 1px dashed rgba(0,195,255,0.2);
            border-radius: 24px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
        }

        .empty-icon svg {
            width: 100%;
            height: 100%;
            stroke: rgba(0,195,255,0.4);
            stroke-width: 1;
            fill: none;
        }

        .empty-text {
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
            margin-bottom: 32px;
        }

        .btn-primary {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,195,255,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,195,255,0.5);
        }

        .footer {
            padding: 60px;
            border-top: 1px solid rgba(0,195,255,0.1);
            text-align: center;
            margin-top: 60px;
        }

        .footer-text { color: rgba(255,255,255,0.4); font-size: 0.85rem; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(0,195,255,0.2);
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0,195,255,0.1);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .modal-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
        }

        .modal-close:hover { color: #fff; }

        .modal-body {
            padding: 24px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-message {
            max-width: 85%;
        }

        .chat-message.user {
            align-self: flex-end;
        }

        .chat-message.assistant {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .chat-message.user .message-bubble {
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .chat-message.assistant .message-bubble {
            background: rgba(30,30,50,0.8);
            border: 1px solid rgba(0,195,255,0.15);
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            padding: 0 4px;
        }

        .chat-message.user .message-time { text-align: right; }

        @media (max-width: 900px) {
            .nav { padding: 0 24px; }
            .nav-links { display: none; }
            .mobile-menu-toggle { display: block; }
            .hero { padding: 80px 24px 30px; }
            .content { padding: 0 24px 60px; }
            .records-grid { grid-template-columns: 1fr; }
            .modal { width: 95%; }
        }
    </style>
    <script src="{% static 'js/common.js' %}"></script>
</head>
<body>
    <div class="tech-bg">
        <div class="grid-overlay"></div>
        <div class="glow-orb glow-orb-1"></div>
    </div>

    <nav class="nav">
        <a href="{% url 'detection_home' %}" class="logo">科大巡弋</a>
        <div class="nav-links">
            <a href="{% url 'detection_home' %}" class="nav-link">首页</a>
            <a href="{% url 'detection_detect' %}" class="nav-link">检测</a>
            <a href="{% url 'detection_history' %}" class="nav-link">历史</a>
            <a href="{% url 'xiaoyu_chat' %}" class="nav-link active">小科客服</a>
            <a href="{% url 'detection_profile' %}" class="nav-link">我的</a>
        </div>
        <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
            <span class="hamburger"></span>
        </button>
        <div class="nav-user">
            <span class="user-name">{{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn-logout">退出</a>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="{% url 'detection_home' %}" class="nav-link">首页</a>
        <a href="{% url 'detection_detect' %}" class="nav-link">检测</a>
        <a href="{% url 'detection_history' %}" class="nav-link">历史</a>
        <a href="{% url 'xiaoyu_chat' %}" class="nav-link active">小科客服</a>
        <a href="{% url 'detection_profile' %}" class="nav-link">我的</a>
    </div>

    <main class="main">
        <div class="hero">
            <h1 class="hero-title">聊天记录</h1>
            <p class="hero-subtitle">管理您与小科的对话历史</p>
        </div>

        <div class="content">
            <div id="records-container">
                <div class="empty-state" id="loading-state">
                    <p class="empty-text">加载中...</p>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p class="footer-text">© 2024 科大巡弋. 智能航拍目标检测系统.</p>
        </footer>
    </main>

    <!-- 聊天记录详情弹窗 -->
    <div class="modal-overlay" id="chat-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">聊天记录</span>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="chat-messages" id="chat-messages"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('active');
        }

        function getCookie(name) {
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        async function loadChatRecords() {
            try {
                const res = await fetch('/api/chat/records/', {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await res.json();

                const container = document.getElementById('records-container');

                if (!data.success || !data.records || data.records.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">
                                <svg viewBox="0 0 64 64">
                                    <path d="M8 12h48a4 4 0 014 4v32a4 4 0 01-4 4H20L8 60V16a4 4 0 014-4z"/>
                                    <path d="M20 24h24M20 32h16M20 40h20"/>
                                </svg>
                            </div>
                            <p class="empty-text">暂无聊天记录</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <div class="records-grid">
                        ${data.records.map(record => `
                            <div class="record-card" onclick="viewRecord(${record.id})">
                                <div class="record-body">
                                    <div class="record-header">
                                        <div class="record-title">${escapeHtml(record.title)}</div>
                                        <span class="record-badge">${record.message_count} 条消息</span>
                                    </div>
                                    <div class="record-meta">
                                        <span class="record-time">${record.created_at}</span>
                                    </div>
                                    <div class="record-actions">
                                        <button class="btn-action btn-view" onclick="event.stopPropagation(); viewRecord(${record.id})">查看</button>
                                        <button class="btn-action btn-delete" onclick="event.stopPropagation(); deleteRecord(${record.id})">删除</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {
                document.getElementById('records-container').innerHTML = `
                    <div class="empty-state">
                        <p class="empty-text">加载失败，请刷新页面重试</p>
                    </div>
                `;
            }
        }

        async function viewRecord(recordId) {
            try {
                const res = await fetch(`/api/chat/record/${recordId}/`, {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await res.json();

                if (!data.success) {
                    Toast.error(data.error || '加载失败', '错误');
                    return;
                }

                document.getElementById('modal-title').textContent = data.record.title;
                const messagesContainer = document.getElementById('chat-messages');

                messagesContainer.innerHTML = data.record.messages.map(msg => `
                    <div class="chat-message ${msg.role}">
                        <div class="message-bubble">${escapeHtml(msg.content)}</div>
                    </div>
                `).join('');

                document.getElementById('chat-modal').classList.add('active');
            } catch (e) {
                Toast.error('加载聊天记录失败', '错误');
            }
        }

        function closeModal() {
            document.getElementById('chat-modal').classList.remove('active');
        }

        async function deleteRecord(recordId) {
            const confirmed = await Modal.confirm('确定要删除这条聊天记录吗？此操作不可撤销。', {
                title: '确认删除',
                type: 'danger',
                confirmText: '删除',
                cancelText: '取消'
            });

            if (!confirmed) return;

            try {
                const res = await fetch(`/api/chat/delete/${recordId}/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await res.json();

                if (data.success) {
                    Toast.success('记录已删除', '成功');
                    loadChatRecords();
                } else {
                    Toast.error(data.error || '删除失败', '错误');
                }
            } catch (e) {
                Toast.error('删除失败', '错误');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击弹窗背景关闭
        document.getElementById('chat-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 页面加载时获取聊天记录
        loadChatRecords();
    </script>
</body>
</html>

{% load static %}
<!-- 小科客服助手 -->
<button class="chat-fab" id="chat-fab" onclick="toggleChat()" title="小科客服">
    <svg viewBox="0 0 24 24">
        <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
    </svg>
</button>

<div class="chat-window" id="chat-window">
    <!-- 侧边栏：聊天历史列表 -->
    <div class="chat-sidebar" id="chat-sidebar">
        <div class="sidebar-header">
            <h3>聊天记录</h3>
            <button class="sidebar-close" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新建对话
        </button>
        <div class="chat-history-list" id="chat-history-list">
            <!-- 历史记录列表 -->
        </div>
    </div>

    <!-- 主聊天区域 -->
    <div class="chat-main">
        <div class="chat-header">
            <button class="chat-sidebar-toggle" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="chat-avatar">
                <svg viewBox="0 0 24 24">
                    <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                </svg>
            </div>
            <div class="chat-info">
                <h3>小科客服</h3>
                <span id="chat-status">在线</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-input" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="chat-send" id="chat-send" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<style>
/* ==================== Chat Widget Extended ==================== */
.chat-sidebar {
    width: 0;
    height: 100%;
    background: rgba(15, 15, 25, 0.98);
    border-right: 1px solid rgba(0, 195, 255, 0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.3s ease;
    flex-shrink: 0;
}

.chat-sidebar.active {
    width: 200px;
    min-width: 200px;
}

.sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid rgba(0, 195, 255, 0.1);
}

.sidebar-header h3 {
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
}

.sidebar-close {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    padding: 4px;
    display: none;
}

.sidebar-close:hover {
    color: #fff;
}

.chat-sidebar.active .sidebar-close {
    display: block;
}

.new-chat-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 12px;
    padding: 10px 16px;
    background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.new-chat-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(0, 195, 255, 0.3);
}

.chat-history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
}

.history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    margin-bottom: 4px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.history-item:hover {
    background: rgba(0, 195, 255, 0.1);
}

.history-item.active {
    background: rgba(0, 195, 255, 0.15);
    border: 1px solid rgba(0, 195, 255, 0.2);
}

.history-item-content {
    flex: 1;
    overflow: hidden;
}

.history-item-title {
    font-size: 0.8rem;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.history-item-time {
    font-size: 0.65rem;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 2px;
}

.history-item-delete {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.3);
    cursor: pointer;
    padding: 4px;
    opacity: 0;
    transition: all 0.2s;
    flex-shrink: 0;
}

.history-item:hover .history-item-delete {
    opacity: 1;
}

.history-item-delete:hover {
    color: #f87171;
}

.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.chat-sidebar-toggle {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    padding: 8px;
    margin-right: 4px;
    transition: color 0.2s;
}

.chat-sidebar-toggle:hover {
    color: #fff;
}

.chat-header {
    padding: 12px 16px;
    background: rgba(20, 20, 30, 0.9);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 10px;
}

.chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.chat-avatar svg {
    width: 20px;
    height: 20px;
    stroke: #fff;
    stroke-width: 2;
    fill: none;
}

.chat-info {
    flex: 1;
    min-width: 0;
}

.chat-info h3 {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 1px;
}

.chat-info span {
    font-size: 0.7rem;
    color: var(--text-muted);
}

.chat-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
}

.chat-close:hover {
    color: #fff;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.chat-message {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.85rem;
    line-height: 1.5;
    word-break: break-word;
}

.chat-message.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
    color: #fff;
    border-bottom-right-radius: 4px;
}

.chat-message.assistant {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
}

.chat-message.loading {
    color: var(--text-muted);
    font-style: italic;
}

.chat-input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border-color);
    display: flex;
    gap: 10px;
}

.chat-input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    color: var(--text-primary);
    font-size: 0.85rem;
    outline: none;
    transition: all 0.3s;
}

.chat-input::placeholder {
    color: var(--text-muted);
}

.chat-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0, 195, 255, 0.1);
}

.chat-send {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
}

.chat-send:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 20px rgba(0, 195, 255, 0.4);
}

.chat-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.chat-send svg {
    width: 18px;
    height: 18px;
    stroke: #fff;
    stroke-width: 2;
    fill: none;
}

.empty-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    padding: 40px 20px;
    text-align: center;
}

.empty-chat-icon {
    width: 60px;
    height: 60px;
    margin-bottom: 16px;
    opacity: 0.5;
}

.empty-chat-icon svg {
    width: 100%;
    height: 100%;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
}

.empty-chat-text {
    font-size: 0.9rem;
    margin-bottom: 8px;
}

.empty-chat-hint {
    font-size: 0.75rem;
    opacity: 0.7;
}

@media (max-width: 480px) {
    .chat-window {
        width: 100%;
        right: 0;
        bottom: 0;
        height: 100vh;
        border-radius: 0;
    }

    .chat-fab {
        display: none;
    }

    .chat-sidebar.active {
        width: 100%;
        min-width: 100%;
    }
}
</style>

<script>
(function() {
    const STORAGE_KEY = 'xiaoyu_chat_messages';
    const CURRENT_RECORD_KEY = 'xiaoyu_current_record_id';
    let chatOpen = false;
    let sidebarOpen = false;
    let isLoading = false;
    let chatMessages = [];
    let currentRecordId = null;
    let userLocation = null;

    // 获取用户地理位置
    function getUserLocation() {
        return new Promise(function(resolve) {
            try {
                const cached = localStorage.getItem('xiaoyu_user_location');
                if (cached) {
                    const locData = JSON.parse(cached);
                    const now = Date.now();
                    if (now - locData.timestamp < 24 * 60 * 60 * 1000) {
                        userLocation = locData;
                        resolve(locData);
                        return;
                    }
                }
            } catch (e) {}

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const loc = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            timestamp: Date.now()
                        };
                        try {
                            localStorage.setItem('xiaoyu_user_location', JSON.stringify(loc));
                        } catch (e) {}
                        userLocation = loc;
                        resolve(loc);
                    },
                    function(error) {
                        resolve(null);
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 60000 }
                );
            } else {
                resolve(null);
            }
        });
    }

    // 加载本地消息
    function loadMessages() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                chatMessages = JSON.parse(saved);
            }
            const recordId = localStorage.getItem(CURRENT_RECORD_KEY);
            if (recordId) {
                currentRecordId = parseInt(recordId);
            }
        } catch (e) {
            chatMessages = [];
        }
    }

    // 保存消息到本地
    function saveMessages() {
        try {
            if (chatMessages.length > 50) {
                chatMessages = chatMessages.slice(-50);
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatMessages));
            if (currentRecordId) {
                localStorage.setItem(CURRENT_RECORD_KEY, currentRecordId.toString());
            }
        } catch (e) {
            console.error('保存聊天记录失败:', e);
        }
    }

    // 渲染消息列表
    function renderMessages() {
        const messagesDiv = document.getElementById('chat-messages');
        messagesDiv.innerHTML = '';

        if (chatMessages.length === 0) {
            // 默认欢迎消息
            messagesDiv.innerHTML = `
                <div class="empty-chat">
                    <div class="empty-chat-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                        </svg>
                    </div>
                    <p class="empty-chat-text">开始和我说说话吧</p>
                    <p class="empty-chat-hint">我可以帮你查询天气、搜索地点</p>
                </div>
            `;
            return;
        }

        chatMessages.forEach(function(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message ' + msg.role;
            msgDiv.textContent = msg.content;
            messagesDiv.appendChild(msgDiv);
        });

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // 渲染历史记录列表
    async function renderHistoryList() {
        const listDiv = document.getElementById('chat-history-list');

        try {
            const res = await fetch('/api/chat/records/', {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await res.json();

            if (!data.success || !data.records || data.records.length === 0) {
                listDiv.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:20px;font-size:0.8rem;">暂无历史记录</div>';
                return;
            }

            listDiv.innerHTML = data.records.map(function(record) {
                const isActive = record.id === currentRecordId ? 'active' : '';
                return `
                    <div class="history-item ${isActive}" onclick="loadChatRecord(${record.id})">
                        <div class="history-item-content">
                            <div class="history-item-title">${escapeHtml(record.title)}</div>
                            <div class="history-item-time">${record.created_at}</div>
                        </div>
                        <button class="history-item-delete" onclick="event.stopPropagation(); deleteChatRecord(${record.id})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                            </svg>
                        </button>
                    </div>
                `;
            }).join('');
        } catch (e) {
            listDiv.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:20px;font-size:0.8rem;">加载失败</div>';
        }
    }

    // 加载指定历史记录
    async function loadChatRecord(recordId) {
        try {
            const res = await fetch('/api/chat/record/' + recordId + '/', {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await res.json();

            if (!data.success) {
                Toast.error(data.error || '加载失败', '错误');
                return;
            }

            chatMessages = data.record.messages || [];
            currentRecordId = recordId;
            saveMessages();
            renderMessages();
            renderHistoryList();

            // 关闭侧边栏
            if (window.innerWidth > 480) {
                sidebarOpen = false;
                document.getElementById('chat-sidebar').classList.remove('active');
            }
        } catch (e) {
            Toast.error('加载聊天记录失败', '错误');
        }
    }

    // 开始新对话
    function startNewChat() {
        // 先保存当前对话
        saveChatRecordToServer();

        // 重置状态
        chatMessages = [];
        currentRecordId = null;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(CURRENT_RECORD_KEY);
        renderMessages();
        renderHistoryList();

        // 关闭侧边栏
        if (window.innerWidth > 480) {
            sidebarOpen = false;
            document.getElementById('chat-sidebar').classList.remove('active');
        }
    }

    // 删除聊天记录
    async function deleteChatRecord(recordId) {
        try {
            const res = await fetch('/api/chat/delete/' + recordId + '/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await res.json();

            if (data.success) {
                Toast.success('已删除', '成功');

                // 如果删除的是当前对话，重置
                if (currentRecordId === recordId) {
                    startNewChat();
                }

                renderHistoryList();
            } else {
                Toast.error(data.error || '删除失败', '错误');
            }
        } catch (e) {
            Toast.error('删除失败', '错误');
        }
    }

    // 保存聊天记录到服务器
    async function saveChatRecordToServer() {
        if (chatMessages.length <= 1) return; // 只有欢迎消息时不保存

        try {
            const body = { messages: chatMessages };
            if (currentRecordId) {
                body.record_id = currentRecordId;
            }

            const res = await fetch('/api/chat/save/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(body)
            });
            const data = await res.json();

            if (data.success && data.record_id) {
                currentRecordId = data.record_id;
                localStorage.setItem(CURRENT_RECORD_KEY, currentRecordId.toString());
                renderHistoryList();
            }
        } catch (e) {
            console.error('保存聊天记录失败:', e);
        }
    }

    window.toggleChat = function() {
        chatOpen = !chatOpen;
        const windowEl = document.getElementById('chat-window');
        const fab = document.getElementById('chat-fab');

        if (chatOpen) {
            windowEl.classList.add('active');
            fab.style.display = 'none';
            document.getElementById('chat-input').focus();
            renderMessages();
            renderHistoryList();
        } else {
            windowEl.classList.remove('active');
            fab.style.display = 'flex';
            // 保存聊天记录
            saveChatRecordToServer();
        }
    };

    window.toggleSidebar = function() {
        sidebarOpen = !sidebarOpen;
        const sidebar = document.getElementById('chat-sidebar');
        if (sidebarOpen) {
            sidebar.classList.add('active');
            renderHistoryList();
        } else {
            sidebar.classList.remove('active');
        }
    };

    window.sendMessage = async function() {
        if (isLoading) return;

        const input = document.getElementById('chat-input');
        const messages = document.getElementById('chat-messages');
        const sendBtn = document.getElementById('chat-send');

        const message = input.value.trim();
        if (!message) return;

        // 添加用户消息到列表
        chatMessages.push({ role: 'user', content: message });
        saveMessages();

        // 渲染用户消息
        const userMsg = document.createElement('div');
        userMsg.className = 'chat-message user';
        userMsg.textContent = message;
        messages.appendChild(userMsg);

        // 清空输入框
        input.value = '';

        // 滚动到底部
        messages.scrollTop = messages.scrollHeight;

        // 显示加载状态
        isLoading = true;
        sendBtn.disabled = true;

        const loadingMsg = document.createElement('div');
        loadingMsg.className = 'chat-message assistant loading';
        loadingMsg.textContent = '小科正在思考...';
        messages.appendChild(loadingMsg);
        messages.scrollTop = messages.scrollHeight;

        // 获取用户位置
        let userLoc = null;
        try {
            userLoc = await getUserLocation();
        } catch (e) {}

        try {
            const requestBody = { message: message };
            if (userLoc) {
                requestBody.user_location = userLoc;
            }

            const response = await fetch('/api/chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();

            // 移除加载消息
            loadingMsg.remove();

            if (data.success) {
                // 添加助手消息到列表
                chatMessages.push({ role: 'assistant', content: data.reply });
                saveMessages();

                const assistantMsg = document.createElement('div');
                assistantMsg.className = 'chat-message assistant';
                assistantMsg.textContent = data.reply;
                messages.appendChild(assistantMsg);
            } else {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'chat-message assistant';
                errorMsg.textContent = '抱歉，' + (data.error || '小科暂时无法回答这个问题');
                messages.appendChild(errorMsg);
            }
        } catch (e) {
            loadingMsg.remove();
            const errorMsg = document.createElement('div');
            errorMsg.className = 'chat-message assistant';
            errorMsg.textContent = '网络错误，请稍后再试';
            messages.appendChild(errorMsg);
        }

        // 恢复发送按钮
        isLoading = false;
        sendBtn.disabled = false;
        messages.scrollTop = messages.scrollHeight;
    };

    // 辅助函数
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function getCookie(name) {
        let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
        return v ? v[2] : null;
    }

    // 初始化
    loadMessages();

    // ESC 键关闭聊天窗口
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && chatOpen) {
            if (sidebarOpen) {
                sidebarOpen = false;
                document.getElementById('chat-sidebar').classList.remove('active');
            } else {
                toggleChat();
            }
        }
    });

    // 页面卸载时保存聊天记录
    window.addEventListener('beforeunload', function() {
        saveChatRecordToServer();
    });

    // 暴露方法给外部调用
    window.loadChatRecord = loadChatRecord;
    window.deleteChatRecord = deleteChatRecord;
    window.startNewChat = startNewChat;
})();
</script>

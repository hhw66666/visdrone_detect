{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小科客服 - 科大巡弋</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger {
            display: block;
            width: 24px;
            height: 2px;
            background: currentColor;
            position: relative;
            transition: all 0.3s;
        }

        .hamburger::before, .hamburger::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: currentColor;
            transition: all 0.3s;
        }

        .hamburger::before { top: -8px; }
        .hamburger::after { bottom: -8px; }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            background: rgba(10,10,15,0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,195,255,0.1);
            padding: 20px;
            z-index: 99;
        }

        .mobile-menu.active { display: block; }
        .mobile-menu .nav-link { display: block; padding: 16px 0; border-bottom: 1px solid rgba(0,195,255,0.05); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }

        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0,195,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,195,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6366f1 0%, transparent 70%);
            top: -100px;
            right: 10%;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 60px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,195,255,0.1);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(0,195,255,0.5);
        }

        .nav-links { display: flex; gap: 40px; }

        .nav-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s;
            padding: 8px 0;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00c3ff, #6366f1);
            transition: width 0.3s;
        }

        .nav-link:hover, .nav-link.active { color: #fff; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        .nav-user { display: flex; align-items: center; gap: 20px; }
        .user-name { font-size: 0.875rem; color: rgba(255,255,255,0.7); }

        .btn-logout {
            padding: 8px 16px;
            background: rgba(0,195,255,0.1);
            border: 1px solid rgba(0,195,255,0.2);
            color: #00c3ff;
            text-decoration: none;
            font-size: 0.8rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(0,195,255,0.2);
            box-shadow: 0 0 20px rgba(0,195,255,0.2);
        }

        .main {
            position: relative;
            z-index: 10;
            padding-top: 64px;
            min-height: 100vh;
            display: flex;
        }

        /* 聊天容器 */
        .chat-container {
            display: flex;
            width: 100%;
            height: calc(100vh - 64px);
        }

        /* 侧边栏 */
        .chat-sidebar {
            width: 280px;
            height: 100%;
            background: rgba(15, 15, 25, 0.95);
            border-right: 1px solid rgba(0,195,255,0.1);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0,195,255,0.1);
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,195,255,0.3);
        }

        .chat-history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(0,195,255,0.1);
        }

        .history-item.active {
            background: rgba(0,195,255,0.15);
            border: 1px solid rgba(0,195,255,0.25);
        }

        .history-item-content {
            flex: 1;
            overflow: hidden;
        }

        .history-item-title {
            font-size: 0.85rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-meta {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
        }

        .history-item-delete {
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            padding: 6px;
            opacity: 0;
            transition: all 0.2s;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .history-item:hover .history-item-delete {
            opacity: 1;
        }

        .history-item-delete:hover {
            color: #f87171;
            background: rgba(239,68,68,0.1);
        }

        /* 主聊天区域 */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 20px 32px;
            background: rgba(20,20,30,0.8);
            border-bottom: 1px solid rgba(0,195,255,0.1);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-avatar-lg {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-avatar-lg svg {
            width: 28px;
            height: 28px;
            stroke: #fff;
            stroke-width: 2;
            fill: none;
        }

        .chat-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-info span {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-message {
            max-width: 85%;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 0 !important;
            background: none !important;
            border: none !important;
            border-radius: 0 !important;
        }

        .chat-message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .chat-message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .chat-message.user .message-avatar {
            background: rgba(0,195,255,0.2);
            border: 1px solid rgba(0,195,255,0.3);
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-avatar svg {
            width: 20px;
            height: 20px;
            stroke: #fff;
            stroke-width: 2;
            fill: none;
        }

        .message-text {
            flex: 1;
            min-width: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            word-break: break-word;
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0,195,255,0.15);
            background: rgba(25,25,40,0.8) !important;
        }

        .chat-message.user .message-text {
            background: rgba(0,195,255,0.15) !important;
            border-color: rgba(0,195,255,0.3) !important;
        }

        .chat-message.loading {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            color: rgba(255,255,255,0.5);
            font-style: italic;
        }

        .message-time {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            padding: 0 4px;
        }

        .chat-message.user .message-time {
            text-align: right;
        }

        /* 空状态 */
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            text-align: center;
        }

        .empty-chat-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, rgba(0,195,255,0.1) 0%, rgba(99,102,241,0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-chat-icon svg {
            width: 50px;
            height: 50px;
            stroke: rgba(0,195,255,0.6);
            stroke-width: 1.5;
            fill: none;
        }

        .empty-chat h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #00c3ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-chat p {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .empty-chat-hint {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 20px 32px 32px;
            background: rgba(20,20,30,0.6);
            border-top: 1px solid rgba(0,195,255,0.1);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 14px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            padding: 16px 24px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,195,255,0.15);
            border-radius: 24px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .chat-input:focus {
            border-color: rgba(0,195,255,0.4);
            box-shadow: 0 0 20px rgba(0,195,255,0.1);
        }

        .chat-send {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c3ff 0%, #6366f1 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .chat-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 25px rgba(0,195,255,0.4);
        }

        .chat-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .chat-send svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
            stroke-width: 2;
            fill: none;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(0,195,255,0.6);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .nav { padding: 0 24px; }
            .nav-links { display: none; }
            .mobile-menu-toggle { display: block; }

            .chat-sidebar {
                position: fixed;
                left: -280px;
                top: 64px;
                height: calc(100vh - 64px);
                z-index: 50;
                transition: left 0.3s;
            }

            .chat-sidebar.active {
                left: 0;
            }

            .chat-container {
                flex-direction: column;
            }

            .chat-header {
                padding: 16px 20px;
            }

            .chat-messages {
                padding: 20px;
            }

            .chat-message {
                max-width: 90%;
            }

            .chat-input-area {
                padding: 16px 20px 24px;
            }

            .chat-input-wrapper {
                max-width: 100%;
            }

            .mobile-overlay {
                display: none;
                position: fixed;
                top: 64px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 49;
            }

            .mobile-overlay.active {
                display: block;
            }
        }
    </style>
    <script src="{% static 'js/common.js' %}"></script>
</head>
<body>
    <div class="tech-bg">
        <div class="grid-overlay"></div>
        <div class="glow-orb glow-orb-1"></div>
    </div>

    <nav class="nav">
        <a href="{% url 'detection_home' %}" class="logo">科大巡弋</a>
        <div class="nav-links">
            <a href="{% url 'detection_home' %}" class="nav-link">首页</a>
            <a href="{% url 'detection_detect' %}" class="nav-link">检测</a>
            <a href="{% url 'detection_history' %}" class="nav-link">历史</a>
            <a href="{% url 'xiaoyu_chat' %}" class="nav-link active">小科客服</a>
            <a href="{% url 'detection_profile' %}" class="nav-link">我的</a>
        </div>
        <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
            <span class="hamburger"></span>
        </button>
        <div class="nav-user">
            <span class="user-name">{{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn-logout">退出</a>
        </div>
    </nav>

    <div class="mobile-overlay" id="mobile-overlay" onclick="toggleSidebar()"></div>

    <div class="mobile-menu" id="mobile-menu">
        <a href="{% url 'detection_home' %}" class="nav-link">首页</a>
        <a href="{% url 'detection_detect' %}" class="nav-link">检测</a>
        <a href="{% url 'detection_history' %}" class="nav-link">历史</a>
        <a href="{% url 'xiaoyu_chat' %}" class="nav-link active">小科客服</a>
        <a href="{% url 'detection_profile' %}" class="nav-link">我的</a>
    </div>

    <main class="main">
        <div class="chat-container">
            <!-- 侧边栏 -->
            <div class="chat-sidebar" id="chat-sidebar">
                <div class="sidebar-header">
                    <h2>小科客服</h2>
                    <button class="new-chat-btn" onclick="startNewChat()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        新建对话
                    </button>
                </div>
                <div class="chat-history-list" id="chat-history-list">
                    <div style="text-align:center;color:rgba(255,255,255,0.4);padding:30px;font-size:0.85rem;">加载中...</div>
                </div>
            </div>

            <!-- 主聊天区域 -->
            <div class="chat-main">
                <div class="chat-header">
                    <button class="mobile-menu-toggle" onclick="toggleSidebar()" style="display:none;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <div class="chat-avatar-lg">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                        </svg>
                    </div>
                    <div class="chat-info">
                        <h1>小科客服</h1>
                        <span id="chat-status">在线</span>
                    </div>
                </div>

                <!-- 消息列表 -->
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-chat">
                        <div class="empty-chat-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                            </svg>
                        </div>
                        <h2>你好，我是小科</h2>
                        <p>科大巡弋智能航拍目标检测系统的AI客服助手</p>
                        <p>有什么可以帮助你的吗？</p>
                        <p class="empty-chat-hint">我可以帮你查询天气、搜索地点、解答系统使用问题</p>
                    </div>
                </div>

                <!-- 输入区域 -->
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <input type="text" class="chat-input" id="chat-input" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button class="chat-send" id="chat-send" onclick="sendMessage()">
                            <svg viewBox="0 0 24 24">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    (function() {
        const STORAGE_KEY = 'xiaoyu_chat_messages';
        const CURRENT_RECORD_KEY = 'xiaoyu_current_record_id';
        let chatMessages = [];
        let currentRecordId = null;
        let isLoading = false;
        let userLocation = null;
        window.USER_AVATAR = '{{ user_avatar|default:'' }}';

        // 获取用户地理位置
        function getUserLocation() {
            return new Promise(function(resolve) {
                try {
                    const cached = localStorage.getItem('xiaoyu_user_location');
                    if (cached) {
                        const locData = JSON.parse(cached);
                        if (Date.now() - locData.timestamp < 24 * 60 * 60 * 1000) {
                            userLocation = locData;
                            resolve(locData);
                            return;
                        }
                    }
                } catch (e) {}

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        function(position) {
                            const loc = {
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude,
                                timestamp: Date.now()
                            };
                            try {
                                localStorage.setItem('xiaoyu_user_location', JSON.stringify(loc));
                            } catch (e) {}
                            userLocation = loc;
                            resolve(loc);
                        },
                        function() { resolve(null); },
                        { enableHighAccuracy: true, timeout: 5000, maximumAge: 60000 }
                    );
                } else {
                    resolve(null);
                }
            });
        }

        // 加载本地消息
        function loadMessages() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) chatMessages = JSON.parse(saved);
                const recordId = localStorage.getItem(CURRENT_RECORD_KEY);
                if (recordId) currentRecordId = parseInt(recordId);
            } catch (e) {
                chatMessages = [];
            }
        }

        // 保存消息到本地
        function saveMessages() {
            try {
                if (chatMessages.length > 100) {
                    chatMessages = chatMessages.slice(-100);
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(chatMessages));
                if (currentRecordId) {
                    localStorage.setItem(CURRENT_RECORD_KEY, currentRecordId.toString());
                }
            } catch (e) {}
        }

        // 渲染消息
        function renderMessages() {
            const messagesDiv = document.getElementById('chat-messages');

            if (chatMessages.length === 0) {
                messagesDiv.innerHTML = `
                    <div class="empty-chat">
                        <div class="empty-chat-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                            </svg>
                        </div>
                        <h2>你好，我是小科</h2>
                        <p>科大巡弋智能航拍目标检测系统的AI客服助手</p>
                        <p>有什么可以帮助你的吗？</p>
                        <p class="empty-chat-hint">我可以帮你查询天气、搜索地点、解答系统使用问题</p>
                    </div>
                `;
                return;
            }

            messagesDiv.innerHTML = chatMessages.map(function(msg) {
                const userAvatar = msg.role === 'user'
                    ? (window.USER_AVATAR || '')
                    : '';
                const userAvatarHtml = userAvatar
                    ? `<img src="${userAvatar}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`
                    : '<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
                const assistantAvatar = '<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>';
                const avatarHtml = msg.role === 'user' ? userAvatarHtml : assistantAvatar;
                return `
                    <div class="chat-message ${msg.role}">
                        <div class="message-avatar">${avatarHtml}</div>
                        <div class="message-text">${escapeHtml(msg.content)}</div>
                    </div>
                `;
            }).join('');

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 渲染历史列表
        async function renderHistoryList() {
            const listDiv = document.getElementById('chat-history-list');

            try {
                const res = await fetch('/api/chat/records/', {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await res.json();

                if (!data.success || !data.records || data.records.length === 0) {
                    listDiv.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:30px;font-size:0.85rem;">暂无历史记录</div>';
                    return;
                }

                listDiv.innerHTML = data.records.map(function(record) {
                    const isActive = record.id === currentRecordId ? 'active' : '';
                    return `
                        <div class="history-item ${isActive}" onclick="loadChatRecord(${record.id})">
                            <div class="history-item-content">
                                <div class="history-item-title">${escapeHtml(record.title)}</div>
                                <div class="history-item-meta">
                                    <span>${record.message_count} 条消息</span>
                                    <span>${record.created_at}</span>
                                </div>
                            </div>
                            <button class="history-item-delete" onclick="event.stopPropagation(); deleteChatRecord(${record.id})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                </svg>
                            </button>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                listDiv.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:30px;font-size:0.85rem;">加载失败</div>';
            }
        }

        // 加载指定历史记录
        async function loadChatRecord(recordId) {
            try {
                const res = await fetch('/api/chat/record/' + recordId + '/', {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await res.json();

                if (!data.success) {
                    Toast.error(data.error || '加载失败', '错误');
                    return;
                }

                chatMessages = data.record.messages || [];
                currentRecordId = recordId;
                saveMessages();
                renderMessages();
                renderHistoryList();

                // 关闭移动端侧边栏
                document.getElementById('chat-sidebar').classList.remove('active');
                document.getElementById('mobile-overlay').classList.remove('active');
            } catch (e) {
                Toast.error('加载聊天记录失败', '错误');
            }
        }

        // 开始新对话
        function startNewChat() {
            // 不再保存旧对话，让用户自己决定
            chatMessages = [];
            currentRecordId = null;
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(CURRENT_RECORD_KEY);
            renderMessages();

            document.getElementById('chat-sidebar').classList.remove('active');
            document.getElementById('mobile-overlay').classList.remove('active');
        }

        // 删除聊天记录
        async function deleteChatRecord(recordId) {
            if (!confirm('确定要删除这条聊天记录吗？')) return;

            try {
                const res = await fetch('/api/chat/delete/' + recordId + '/', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await res.json();

                if (data.success) {
                    if (currentRecordId === recordId) {
                        chatMessages = [];
                        currentRecordId = null;
                        localStorage.removeItem(STORAGE_KEY);
                        localStorage.removeItem(CURRENT_RECORD_KEY);
                        renderMessages();
                    }
                    renderHistoryList();
                    Toast.success('已删除', '成功');
                } else {
                    Toast.error(data.error || '删除失败', '错误');
                }
            } catch (e) {
                Toast.error('删除失败', '错误');
            }
        }

        // 保存到服务器
        async function saveChatRecordToServer() {
            if (chatMessages.length <= 1) return;

            try {
                const body = { messages: chatMessages };
                if (currentRecordId) body.record_id = currentRecordId;

                const res = await fetch('/api/chat/save/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.success && data.record_id) {
                    currentRecordId = data.record_id;
                    localStorage.setItem(CURRENT_RECORD_KEY, currentRecordId.toString());
                    renderHistoryList();
                }
            } catch (e) {
                console.error('保存失败:', e);
            }
        }

        // 发送消息
        window.sendMessage = async function() {
            if (isLoading) return;

            const input = document.getElementById('chat-input');
            const messages = document.getElementById('chat-messages');
            const sendBtn = document.getElementById('chat-send');

            const message = input.value.trim();
            if (!message) return;

            chatMessages.push({ role: 'user', content: message });
            saveMessages();
            renderMessages();

            input.value = '';
            isLoading = true;
            sendBtn.disabled = true;

            // 添加加载状态
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'chat-message assistant';
            loadingDiv.innerHTML = `
                <div class="message-avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                    </svg>
                </div>
                <div class="message-text">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>
            `;
            messages.appendChild(loadingDiv);
            messages.scrollTop = messages.scrollHeight;

            let userLoc = null;
            try {
                userLoc = await getUserLocation();
            } catch (e) {}

            try {
                const requestBody = { message: message };
                if (userLoc) requestBody.user_location = userLoc;

                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                loadingDiv.remove();

                if (data.success) {
                    chatMessages.push({ role: 'assistant', content: data.reply });
                } else {
                    chatMessages.push({ role: 'assistant', content: '抱歉，' + (data.error || '小科暂时无法回答这个问题') });
                }
            } catch (e) {
                loadingDiv.remove();
                chatMessages.push({ role: 'assistant', content: '网络错误，请稍后再试' });
            }

            saveMessages();
            renderMessages();
            isLoading = false;
            sendBtn.disabled = false;
        };

        // 辅助函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCookie(name) {
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        window.toggleMobileMenu = function() {
            document.getElementById('mobile-menu').classList.toggle('active');
        };

        window.toggleSidebar = function() {
            const sidebar = document.getElementById('chat-sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        };

        // 初始化
        loadMessages();
        renderMessages();
        renderHistoryList();

        // 自动保存
        window.addEventListener('beforeunload', function() {
            saveChatRecordToServer();
        });

        // 暴露方法
        window.loadChatRecord = loadChatRecord;
        window.deleteChatRecord = deleteChatRecord;
        window.startNewChat = startNewChat;
    })();
    </script>
</body>
</html>
